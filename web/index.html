<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Monitor ESP32</title>
    <style>
        body { background: #111; color: #00ff00; font-family: Arial, sans-serif; text-align: center; margin-top: 100px; }
        .valor { font-size: 50px; margin: 20px; }
    </style>
</head>
<body>
    <h1>Dados da ESP32</h1>
    <div class="valor">Velocidade: <span id="velocidade">0</span> km/h</div>
    <div class="valor">RPM: <span id="rpm">0</span></div>

    <script>
        function atualizarDados() {
            // CORRIGIDO: Apontando para o arquivo PHP correto que criamos
            fetch('buscar_ultimo.php')
            .then(response => response.json())
            .then(data => {
                document.getElementById('velocidade').innerText = data.velocidade;
                document.getElementById('rpm').innerText = data.rpm;
            })
            .catch(error => console.error("Erro ao buscar dados:", error));
        }

        // Executa imediatamente ao carregar e depois a cada 1 segundo (conforme regra)
        atualizarDados();
        setInterval(atualizarDados, 1000);
    </script>
</body>
</html>
